<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Préparation Zakaria – Option Radiologique</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#6c63ff">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
<style>
:root {
  --bg: #0f0f13;
  --bg2: #18181f;
  --bg3: #22222d;
  --border: #2e2e3a;
  --text: #f0f0f5;
  --text2: #a0a0b8;
  --text3: #606078;
  --accent: #6c63ff;
  --accent2: #5a52e0;
  --accent-light: rgba(108,99,255,0.15);
  --green: #22c55e;
  --green-light: rgba(34,197,94,0.15);
  --yellow: #f59e0b;
  --yellow-light: rgba(245,158,11,0.12);
  --red: #ef4444;
  --red-light: rgba(239,68,68,0.12);
  --blue: #3b82f6;
  --radius: 14px;
  --radius-sm: 8px;
  --nav-h: 64px;
  --header-h: 56px;
  --transition: 0.2s ease;
}
[data-theme="light"] {
  --bg: #f5f5fa;
  --bg2: #ffffff;
  --bg3: #ededf5;
  --border: #e0e0ea;
  --text: #111118;
  --text2: #555568;
  --text3: #9090a8;
  --accent: #5b52f0;
  --accent2: #4a42df;
  --accent-light: rgba(91,82,240,0.1);
  --green: #16a34a;
  --green-light: rgba(22,163,74,0.1);
  --yellow: #d97706;
  --yellow-light: rgba(217,119,6,0.1);
  --red: #dc2626;
  --red-light: rgba(220,38,38,0.1);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  line-height: 1.5;
  transition: background var(--transition), color var(--transition);
  direction: ltr;
  text-align: left;
}
#app { height: 100vh; height: 100dvh; display: flex; flex-direction: column; position: relative; overflow: hidden; }
.header { height: var(--header-h); background: var(--bg2); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 16px; gap: 10px; flex-shrink: 0; z-index: 10; }
.header-title { flex: 1; font-weight: 700; font-size: 17px; color: var(--text); }
.header-action { background: none; border: none; color: var(--text2); font-size: 22px; cursor: pointer; padding: 6px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: background 0.15s, color 0.15s, transform 0.1s; }
.header-action:active { background: var(--bg3); transform: scale(0.85); }
.back-btn { color: var(--accent); }
.page { flex: 1; overflow-y: auto; overflow-x: hidden; padding-bottom: calc(var(--nav-h) + 8px); -webkit-overflow-scrolling: touch; scroll-behavior: smooth; }
.page-inner { padding: 16px; }
.bottom-nav { height: var(--nav-h); background: var(--bg2); border-top: 1px solid var(--border); display: flex; align-items: center; flex-shrink: 0; z-index: 10; }
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; padding: 8px 0; cursor: pointer; border: none; background: none; color: var(--text3); font-size: 11px; font-family: inherit; transition: color 0.2s, transform 0.15s; border-radius: var(--radius-sm); }
.nav-item i { font-size: 22px; transition: transform 0.15s; }
.nav-item.active { color: var(--accent); }
.nav-item.active i { transform: scale(1.15); }
.nav-item:active { background: var(--bg3); transform: scale(0.9); }
.home-hero { background: linear-gradient(135deg, var(--accent) 0%, #9c5cf5 100%); border-radius: var(--radius); padding: 22px 20px; color: #fff; margin-bottom: 16px; position: relative; overflow: hidden; }
.home-hero::after { content: ''; position: absolute; top: -30px; right: -30px; width: 160px; height: 160px; background: rgba(255,255,255,0.06); border-radius: 50%; }
.home-hero-label { font-size: 13px; opacity: 0.85; margin-bottom: 4px; }
.home-hero-title { font-size: 22px; font-weight: 700; margin-bottom: 16px; }
.home-hero-progress { display: flex; align-items: center; gap: 14px; }
.progress-ring-wrap { position: relative; width: 80px; height: 80px; flex-shrink: 0; }
.progress-ring-wrap svg { transform: rotate(-90deg); }
.progress-ring-bg { fill: none; stroke: rgba(255,255,255,0.2); stroke-width: 7; }
.progress-ring-fill { fill: none; stroke: #fff; stroke-width: 7; stroke-linecap: round; transition: stroke-dashoffset 0.6s ease; }
.progress-ring-text { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 700; font-size: 15px; line-height: 1.1; }
.progress-ring-sub { font-size: 10px; opacity: 0.8; }
.home-hero-stats { flex: 1; }
.home-hero-stat { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 13px; }
.home-hero-stat strong { font-weight: 600; }
.section-title { font-size: 13px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
.stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; display: flex; flex-direction: column; gap: 4px; transition: transform 0.15s, background 0.15s; }
.stat-card:active { transform: scale(0.95); background: var(--bg3); }
.stat-card-icon { font-size: 22px; margin-bottom: 4px; }
.stat-card-val { font-size: 20px; font-weight: 700; }
.stat-card-lbl { font-size: 12px; color: var(--text3); }
.recent-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
.recent-item { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; display: flex; align-items: center; gap: 10px; cursor: pointer; transition: transform 0.15s, background 0.15s; }
.recent-item:active { background: var(--bg3); transform: scale(0.97); }
.recent-item-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.recent-item-info { flex: 1; min-width: 0; }
.recent-item-title { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.recent-item-sub { font-size: 12px; color: var(--text3); }
.search-bar { background: var(--bg2); border: 1px solid var(--border); border-radius: 50px; padding: 10px 16px; display: flex; align-items: center; gap: 10px; margin-bottom: 14px; transition: border-color 0.2s, box-shadow 0.2s; }
.search-bar:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }
.search-bar i { color: var(--text3); font-size: 18px; }
.search-bar input { flex: 1; background: none; border: none; outline: none; font-family: inherit; font-size: 14px; color: var(--text); }
.search-bar input::placeholder { color: var(--text3); }
.subject-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 8px; overflow: hidden; transition: transform 0.15s; position: relative; }
.subject-card:active { transform: scale(0.99); }
.subject-header { padding: 12px 14px; display: flex; align-items: center; gap: 10px; cursor: pointer; user-select: none; transition: background 0.15s; }
.subject-header:active { background: var(--bg3); }
.subject-icon { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.subject-info { flex: 1; min-width: 0; }
.subject-name { font-weight: 600; font-size: 15px; }
.subject-progress { font-size: 12px; color: var(--text3); margin-top: 2px; }
.subject-actions { display: flex; align-items: center; gap: 4px; }
.subject-edit-btn, .subject-delete-btn { background: none; border: none; color: var(--text3); font-size: 18px; cursor: pointer; padding: 4px; border-radius: 6px; transition: background 0.15s, color 0.15s; display: flex; align-items: center; justify-content: center; }
.subject-edit-btn:active, .subject-delete-btn:active { background: var(--bg3); }
.subject-delete-btn:active { color: var(--red); }
.subject-chevron { color: var(--text3); font-size: 18px; transition: transform 0.2s; }
.subject-chevron.open { transform: rotate(90deg); }
.subject-body { display: none; border-top: 1px solid var(--border); }
.subject-body.open { display: block; }
.progress-bar-wrap { height: 4px; background: var(--bg3); }
.progress-bar-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width 0.4s; }
.unit-block { border-bottom: 1px solid var(--border); }
.unit-block:last-child { border-bottom: none; }
.unit-header { padding: 10px 14px; display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; transition: background 0.15s; }
.unit-header:active { background: var(--bg2); }
.unit-title { flex: 1; font-size: 14px; font-weight: 500; color: var(--text); }
.unit-chevron { color: var(--text3); font-size: 16px; transition: transform 0.2s; }
.unit-chevron.open { transform: rotate(90deg); }
.unit-body { display: none; background: var(--bg3); }
.unit-body.open { display: block; }
.lesson-item { border-bottom: 1px solid var(--border); padding: 8px 14px 8px 24px; }
.lesson-item:last-child { border-bottom: none; }
.lesson-title { font-size: 13px; color: var(--text2); margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
.lesson-title i { color: var(--text3); font-size: 14px; }
.branch-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; margin: 4px 0; border-radius: var(--radius-sm); cursor: pointer; transition: background 0.15s, transform 0.15s; }
.branch-item:active { background: var(--bg2); transform: scale(0.96); }
.branch-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; border: 2px solid var(--border); background: var(--bg); transition: all var(--transition); }
.branch-dot.done { background: var(--green); border-color: var(--green); }
.branch-dot.partial { background: var(--yellow); border-color: var(--yellow); }
.branch-name { flex: 1; font-size: 13px; color: var(--text2); }
.branch-count { font-size: 11px; color: var(--text3); }
.branch-arrow { color: var(--text3); font-size: 14px; transition: transform 0.15s; }
.branch-item:active .branch-arrow { transform: translateX(4px); }
.branch-header-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; }
.branch-breadcrumb { font-size: 12px; color: var(--text3); margin-bottom: 6px; line-height: 1.4; }
.branch-main-title { font-size: 18px; font-weight: 700; margin-bottom: 10px; }
.branch-progress-row { display: flex; align-items: center; gap: 10px; }
.branch-progress-bar { flex: 1; height: 8px; background: var(--bg3); border-radius: 4px; overflow: hidden; }
.branch-progress-val { font-size: 13px; font-weight: 600; color: var(--accent); }
.partial-list { display: flex; flex-direction: column; gap: 10px; }
.partial-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; transition: border-color 0.2s, transform 0.15s; }
.partial-card:active { transform: scale(0.99); }
.partial-card.completed { border-color: var(--green); }
.partial-header { padding: 14px; display: flex; align-items: flex-start; gap: 12px; cursor: pointer; transition: background 0.15s; }
.partial-header:active { background: var(--bg3); }
.partial-check { width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; margin-top: 1px; }
.partial-check:active { transform: scale(0.8); background: var(--bg3); }
.partial-check.done { background: var(--green); border-color: var(--green); color: #fff; }
.partial-check i { font-size: 13px; }
.partial-info { flex: 1; }
.partial-title { font-size: 14px; font-weight: 500; line-height: 1.4; }
.partial-meta { font-size: 12px; color: var(--text3); margin-top: 4px; display: flex; gap: 12px; }
.partial-body { display: none; border-top: 1px solid var(--border); padding: 14px; }
.partial-body.open { display: block; }
.tab-bar { display: flex; gap: 4px; background: var(--bg3); border-radius: var(--radius-sm); padding: 4px; margin-bottom: 12px; }
.tab-btn { flex: 1; border: none; background: none; font-family: inherit; font-size: 12px; font-weight: 500; color: var(--text3); padding: 6px 4px; border-radius: 6px; cursor: pointer; transition: all 0.15s, transform 0.1s; }
.tab-btn.active { background: var(--bg2); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
.tab-btn:active { background: var(--bg2); transform: scale(0.95); }
.content-area { font-size: 13px; color: var(--text2); line-height: 1.7; }
.notes-textarea { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; font-family: inherit; font-size: 13px; color: var(--text); resize: vertical; min-height: 100px; outline: none; line-height: 1.6; }
.notes-textarea:focus { border-color: var(--accent); }
.save-notes-btn { margin-top: 8px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); padding: 8px 16px; font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.15s, transform 0.1s; }
.save-notes-btn:active { background: var(--accent2); transform: scale(0.95); }
.exercises-area { display: flex; flex-direction: column; gap: 8px; }
.exercise-item { background: var(--bg3); border-radius: var(--radius-sm); padding: 10px 12px; display: flex; gap: 10px; align-items: flex-start; }
.exercise-check { width: 20px; height: 20px; border-radius: 4px; border: 2px solid var(--border); flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.exercise-check:active { transform: scale(0.8); }
.exercise-check.done { background: var(--green); border-color: var(--green); color: #fff; }
.exercise-check i { font-size: 12px; }
.exercise-text { flex: 1; font-size: 13px; color: var(--text2); }
.add-exercise-row { display: flex; gap: 8px; margin-top: 4px; }
.add-exercise-input { flex: 1; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 12px; font-family: inherit; font-size: 13px; color: var(--text); outline: none; }
.add-exercise-input:focus { border-color: var(--accent); }
.add-exercise-btn { background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); padding: 8px 14px; font-family: inherit; font-size: 13px; cursor: pointer; }
.add-exercise-btn:active { background: var(--accent2); transform: scale(0.95); }
.review-section { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.review-count { font-size: 13px; color: var(--text2); }
.review-count strong { color: var(--accent); font-size: 18px; }
.review-btn { background: var(--accent-light); color: var(--accent); border: 1px solid var(--accent); border-radius: var(--radius-sm); padding: 8px 16px; font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer; }
.review-btn:active { background: var(--accent); color: #fff; transform: scale(0.95); }
.complete-btn-wrap { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
.complete-btn { width: 100%; border: none; border-radius: var(--radius-sm); padding: 11px; font-family: inherit; font-size: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
.complete-btn:active { transform: scale(0.96); }
.complete-btn.done { background: var(--green-light); color: var(--green); }
.complete-btn.undone { background: var(--accent); color: #fff; }
.week-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 6px; margin-bottom: 16px; }
.day-cell { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 4px; text-align: center; cursor: pointer; transition: all 0.2s, transform 0.1s; }
.day-cell:active { background: var(--bg3); transform: scale(0.9); border-color: var(--accent); }
.day-cell.active { border-color: var(--accent); background: var(--accent-light); }
.day-cell.today { border-color: var(--yellow); }
.day-name { font-size: 10px; color: var(--text3); margin-bottom: 4px; }
.day-num { font-size: 16px; font-weight: 700; }
.day-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); margin: 3px auto 0; opacity: 0; }
.day-cell.has-sessions .day-dot { opacity: 1; }
.sessions-container { display: flex; flex-direction: column; gap: 10px; }
.session-add-card { background: var(--bg2); border: 1px dashed var(--border); border-radius: var(--radius-sm); padding: 16px; margin-bottom: 10px; }
.session-add-title { font-size: 14px; font-weight: 600; margin-bottom: 10px; color: var(--text2); }
.session-add-row { display: flex; gap: 8px; flex-wrap: wrap; }
.session-select { flex: 1; min-width: 120px; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 10px; font-family: inherit; font-size: 13px; color: var(--text); outline: none; }
.session-time-input { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 10px; font-family: inherit; font-size: 13px; color: var(--text); outline: none; width: 100px; }
.session-duration-input { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 10px; font-family: inherit; font-size: 13px; color: var(--text); outline: none; width: 90px; }
.session-add-submit { background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); padding: 8px 14px; font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.15s, transform 0.1s; }
.session-add-submit:active { background: var(--accent2); transform: scale(0.95); }
.session-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; display: flex; align-items: center; gap: 12px; }
.session-card:active { background: var(--bg3); transform: scale(0.98); }
.session-card.completed { opacity: 0.6; border-color: var(--green); }
.session-time-badge { background: var(--accent-light); color: var(--accent); border-radius: var(--radius-sm); padding: 4px 10px; font-size: 12px; font-weight: 600; flex-shrink: 0; }
.session-info { flex: 1; }
.session-subject { font-size: 14px; font-weight: 600; }
.session-detail { font-size: 12px; color: var(--text3); }
.session-complete-btn { background: none; border: none; color: var(--text3); font-size: 24px; cursor: pointer; padding: 4px; flex-shrink: 0; }
.session-complete-btn:active { color: var(--green); transform: scale(0.8); }
.session-complete-btn.done { color: var(--green); }
.session-del { background: none; border: none; color: var(--text3); font-size: 18px; cursor: pointer; padding: 4px; flex-shrink: 0; }
.session-del:active { color: var(--red); transform: scale(0.8); }
.empty-state { text-align: center; padding: 30px 20px; color: var(--text3); }
.empty-state i { font-size: 48px; margin-bottom: 10px; display: block; }
.empty-state p { font-size: 14px; }
.stats-hero-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.stats-mini { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; text-align: center; }
.stats-mini-val { font-size: 20px; font-weight: 700; }
.stats-mini-lbl { font-size: 11px; color: var(--text3); margin-top: 2px; }
.subjects-progress { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
.subj-progress-item { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; }
.subj-progress-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.subj-progress-name { font-size: 14px; font-weight: 500; }
.subj-progress-pct { font-size: 13px; font-weight: 700; color: var(--accent); }
.heatmap-grid { display: grid; grid-template-columns: repeat(13, 1fr); gap: 3px; margin-bottom: 8px; }
.heat-cell { aspect-ratio: 1; border-radius: 3px; background: var(--bg3); transition: transform 0.1s; }
.heat-cell:active { transform: scale(1.3); }
.heat-cell[data-lvl="1"] { background: rgba(108,99,255,0.25); }
.heat-cell[data-lvl="2"] { background: rgba(108,99,255,0.5); }
.heat-cell[data-lvl="3"] { background: rgba(108,99,255,0.75); }
.heat-cell[data-lvl="4"] { background: var(--accent); }
.heatmap-legend { display: flex; align-items: center; gap: 6px; justify-content: flex-end; font-size: 11px; color: var(--text3); }
.heatmap-legend-cell { width: 12px; height: 12px; border-radius: 3px; }
#toast { position: fixed; bottom: calc(var(--nav-h) + 16px); left: 50%; transform: translateX(-50%) translateY(20px); background: var(--text); color: var(--bg); border-radius: 50px; padding: 10px 20px; font-size: 13px; font-weight: 600; white-space: nowrap; z-index: 1000; opacity: 0; transition: all 0.3s; pointer-events: none; }
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.chip { display: inline-flex; align-items: center; gap: 4px; border-radius: 50px; padding: 3px 10px; font-size: 11px; font-weight: 600; }
.chip-green { background: var(--green-light); color: var(--green); }
.chip-yellow { background: var(--yellow-light); color: var(--yellow); }
.chip-accent { background: var(--accent-light); color: var(--accent); }
.divider { height: 1px; background: var(--border); margin: 12px 0; }
.text-accent { color: var(--accent); }
.text-green { color: var(--green); }
::-webkit-scrollbar { width: 0; }
.modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; visibility: hidden; transition: all 0.2s; }
.modal-overlay.open { opacity: 1; visibility: visible; }
.modal-card { background: var(--bg2); border-radius: var(--radius); width: 100%; max-width: 500px; max-height: 80vh; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 12px 40px rgba(0,0,0,0.5); }

.modal-title { flex: 1; font-weight: 700; font-size: 17px; }
.modal-close { background: none; border: none; color: var(--text2); font-size: 24px; cursor: pointer; }
.modal-body { flex: 1; overflow-y: auto; padding: 12px 16px; }
.modal-footer { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }
.goal-empty-card { background: var(--bg2); border: 2px dashed var(--accent); border-radius: var(--radius); padding: 20px; text-align: center; margin-bottom: 16px; }
.goal-empty-icon { font-size: 36px; margin-bottom: 8px; color: var(--accent); }
.goal-progress-card { background: linear-gradient(135deg, rgba(108,99,255,0.08), rgba(156,92,245,0.08)); border: 1px solid var(--accent-light); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; display: flex; align-items: center; gap: 16px; }
.goal-circle-wrap { position: relative; width: 70px; height: 70px; flex-shrink: 0; }
.goal-circle-text { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; }
.goal-circle-sub { font-size: 9px; color: var(--text3); }
.goal-info { flex: 1; }
.goal-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
.goal-desc { font-size: 13px; color: var(--text3); margin-bottom: 8px; }
.goal-actions { display: flex; gap: 8px; }
.goal-actions button { background: var(--bg3); border: 1px solid var(--border); color: var(--text); border-radius: var(--radius-sm); padding: 6px 12px; font-family: inherit; font-size: 13px; font-weight: 500; cursor: pointer; }
.goal-actions button:active { background: var(--accent-light); color: var(--accent); transform: scale(0.95); }
#checklist-body { display: flex; flex-direction: column; gap: 12px; }
.checklist-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
.checklist-item:last-child { border-bottom: none; }
.checklist-item-actions { display: flex; align-items: center; gap: 8px; }
.checklist-checkbox { width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--border); cursor: pointer; display: flex; align-items: center; justify-content: center; }
.checklist-checkbox.checked { background: var(--green); border-color: var(--green); color: #fff; }
.checklist-item-title { font-size: 14px; flex: 1; }
.checklist-item-sub { font-size: 12px; color: var(--text3); }
.checklist-delete-btn { background: none; border: none; color: var(--text3); font-size: 18px; cursor: pointer; padding: 4px; }
.checklist-delete-btn:active { color: var(--red); }
.modal-search-bar { margin-bottom: 12px; }
.modal-subject-header { background: var(--bg3); border-radius: var(--radius-sm); padding: 10px 14px; display: flex; align-items: center; gap: 10px; cursor: pointer; margin-bottom: 6px; }
.modal-subject-header:active { background: var(--accent-light); }
.modal-subject-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
.modal-subject-info { flex: 1; }
.modal-subject-name { font-size: 14px; font-weight: 600; }
.modal-subject-count { font-size: 12px; color: var(--text3); }
.modal-subject-chevron { font-size: 18px; color: var(--text3); transition: transform 0.2s; }
.modal-subject-chevron.open { transform: rotate(90deg); }
.modal-subject-body { display: none; padding-left: 8px; margin-bottom: 8px; }
.modal-subject-body.open { display: block; }
.modal-branch-row { background: var(--bg3); border-radius: 6px; padding: 8px 12px; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; cursor: pointer; }
.modal-branch-row:active { background: var(--accent-light); }
.modal-branch-name { flex: 1; font-size: 13px; color: var(--text2); }
.modal-branch-stats { font-size: 11px; color: var(--text3); }
.modal-branch-chevron { font-size: 14px; color: var(--text3); transition: transform 0.2s; }
.modal-branch-chevron.open { transform: rotate(90deg); }
.modal-partials-list { display: none; margin-top: 4px; margin-bottom: 8px; }
.modal-partials-list.open { display: block; }
.modal-partial-label { display: flex; align-items: center; gap: 8px; padding: 6px 8px 6px 20px; border-radius: 6px; cursor: pointer; transition: background 0.15s; }
.modal-partial-label:hover { background: var(--bg3); }
.modal-partial-checkbox { width: 18px; height: 18px; border-radius: 50%; border: 2px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.modal-partial-checkbox.checked { background: var(--accent); border-color: var(--accent); color: #fff; }
.modal-partial-checkbox i { font-size: 12px; }
.modal-partial-title { font-size: 13px; color: var(--text2); flex: 1; }
.delete-partial-btn { background: none; border: none; color: var(--text3); font-size: 16px; cursor: pointer; padding: 2px 4px; margin-left: 4px; transition: color 0.15s; }
.delete-partial-btn:active { color: var(--red); transform: scale(0.9); }
.add-subject-btn { margin-top: 8px; width: 100%; background: var(--bg2); border: 2px dashed var(--border); border-radius: var(--radius-sm); padding: 14px; font-family: inherit; font-size: 14px; font-weight: 600; color: var(--text2); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s; }
.add-subject-btn:active { background: var(--bg3); border-color: var(--accent); color: var(--accent); transform: scale(0.98); }
.icon-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin: 12px 0; }
.icon-option { width: 40px; height: 40px; border-radius: 10px; background: var(--bg3); display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; border: 2px solid transparent; transition: all 0.15s; color: var(--text); }
.icon-option:active, .icon-option.selected { border-color: var(--accent); background: var(--accent-light); transform: scale(0.95); }
.color-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin: 12px 0; }
.color-option { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: all 0.15s; }
.color-option:active, .color-option.selected { border-color: var(--text); transform: scale(1.1); }
</style>
</head>
<body>
<div id="app">
  <div class="header" id="header">
    <button class="header-action back-btn" id="back-btn" style="display:none" onclick="goBack()"><i class="ri-arrow-left-line"></i></button>
    <div class="header-title" id="header-title">Préparation Zakaria</div>
    <button class="header-action" onclick="toggleTheme()" id="theme-btn" title="Changer le thème"><i class="ri-moon-line" id="theme-icon"></i></button>
  </div>
  <div class="page" id="page-content"></div>
  <nav class="bottom-nav" id="bottom-nav">
    <button class="nav-item active" data-page="home" onclick="nav('home')"><i class="ri-home-5-line"></i>Accueil</button>
    <button class="nav-item" data-page="subjects" onclick="nav('subjects')"><i class="ri-book-open-line"></i>Modules</button>
    <button class="nav-item" data-page="schedule" onclick="nav('schedule')"><i class="ri-calendar-2-line"></i>Planning</button>
    <button class="nav-item" data-page="stats" onclick="nav('stats')"><i class="ri-bar-chart-2-line"></i>Stats</button>
  </nav>
</div>
<div id="goal-modal" class="modal-overlay">...</div>
<div id="checklist-modal" class="modal-overlay">...</div>
<div id="subject-modal" class="modal-overlay">
  <div class="modal-card">
    <div class="modal-header"><div class="modal-title" id="subject-modal-title">Ajouter un module</div><button class="modal-close" onclick="closeSubjectModal()"><i class="ri-close-line"></i></button></div>
    <div class="modal-body">
      <div style="margin-bottom:12px"><label style="font-size:13px;color:var(--text2);display:block;margin-bottom:4px">Nom du module</label><input class="add-exercise-input" id="subject-name-input" style="width:100%" placeholder="Nom du module..."></div>
      <label style="font-size:13px;color:var(--text2);display:block;margin-bottom:4px">Icône</label>
      <div class="icon-grid" id="icon-grid"></div>
      <label style="font-size:13px;color:var(--text2);display:block;margin-bottom:4px">Couleur</label>
      <div class="color-grid" id="color-grid"></div>
    </div>
    <div class="modal-footer">
      <button class="save-notes-btn" id="subject-delete-btn" style="background:var(--red);color:#fff;display:none" onclick="deleteSubjectConfirm()"><i class="ri-delete-bin-line"></i> Supprimer</button>
      <button class="save-notes-btn" onclick="saveSubject()"><i class="ri-check-line"></i> Enregistrer</button>
    </div>
  </div>
</div>
<div id="toast"></div>
<script>
'use strict';
const LS = { get: (k, def) => { try { const v = localStorage.getItem(k); return v !== null ? JSON.parse(v) : def; } catch { return def; } }, set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} } };
const KEY_PROGRESS = 'prep_progress', KEY_NOTES = 'prep_notes', KEY_EXERCISES = 'prep_exercises', KEY_ACTIVITY = 'prep_activity', KEY_SCHEDULE = 'prep_schedule', KEY_THEME = 'prep_theme', KEY_WEEKLY_GOAL = 'prep_weekly_goal', KEY_CUSTOM_PARTIALS = 'prep_custom_partials', KEY_CUSTOM_SUBJECTS = 'prep_custom_subjects', KEY_EDITED_SUBJECTS = 'prep_edited_subjects';
let currentTheme = LS.get(KEY_THEME, 'dark');
function applyTheme(t) { document.documentElement.setAttribute('data-theme', t); const icon = document.getElementById('theme-icon'); if (icon) icon.className = t === 'dark' ? 'ri-moon-line' : 'ri-sun-line'; }
function toggleTheme() { currentTheme = currentTheme === 'dark' ? 'light' : 'dark'; LS.set(KEY_THEME, currentTheme); applyTheme(currentTheme); }
applyTheme(currentTheme);

const DEFAULT_SUBJECTS = [
  { id: "subj-physradio", title: "Physique appliquée en radiologie", icon: 'ri-flashlight-line', color: '#f59e0b', bg: 'rgba(245,158,11,0.15)' },
  { id: "subj-physcan", title: "Physique appliquée en scanographie", icon: 'ri-scan-line', color: '#3b82f6', bg: 'rgba(59,130,246,0.12)' },
  { id: "subj-protoTDM", title: "Protocole en TDM", icon: 'ri-file-list-3-line', color: '#8b5cf6', bg: 'rgba(139,92,246,0.12)' },
  { id: "subj-physIRM", title: "Physique appliquée en IRM", icon: 'ri-magic-line', color: '#ec4899', bg: 'rgba(236,72,153,0.12)' },
  { id: "subj-protoIRM", title: "Protocoles IRM", icon: 'ri-file-text-line', color: '#14b8a6', bg: 'rgba(20,184,166,0.12)' },
  { id: "subj-anatphys", title: "Anatomie et physiologie humaine", icon: 'ri-heart-pulse-line', color: '#ef4444', bg: 'rgba(239,68,68,0.12)' },
  { id: "subj-anatTopo", title: "Anatomie topographique et radiologique", icon: 'ri-scan-2-line', color: '#f97316', bg: 'rgba(249,115,22,0.12)' },
  { id: "subj-techAxial", title: "Technique axiale d’exploration radiologique", icon: 'ri-ruler-line', color: '#84cc16', bg: 'rgba(132,204,22,0.12)' },
  { id: "subj-techApp", title: "Technique appendiculaire d’exploration radiologique", icon: 'ri-tools-line', color: '#06b6d4', bg: 'rgba(6,182,212,0.12)' },
  { id: "subj-pharmaco", title: "Pharmacologie et technique viscérale", icon: 'ri-capsule-line', color: '#a855f7', bg: 'rgba(168,85,247,0.12)' },
  { id: "subj-sciencesBio", title: "Les sciences biologiques", icon: 'ri-microscope-line', color: '#22c55e', bg: 'rgba(34,197,94,0.12)' },
  { id: "subj-santeNat", title: "Systèmes nationaux de la santé et économie de la santé", icon: 'ri-government-line', color: '#64748b', bg: 'rgba(100,116,139,0.12)' },
  { id: "subj-commInfo", title: "Langue, communication, informatique", icon: 'ri-chat-3-line', color: '#2563eb', bg: 'rgba(37,99,235,0.12)' },
  { id: "subj-maintenance", title: "Maintenance, démarche qualité, gestion des risques", icon: 'ri-settings-3-line', color: '#78716c', bg: 'rgba(120,113,108,0.12)' },
  { id: "subj-radioBio", title: "Radiobiologie et radioprotection", icon: 'ri-radioactive-line', color: '#ef4444', bg: 'rgba(239,68,68,0.15)' },
  { id: "subj-echoAngio", title: "Échographie et angiographie", icon: 'ri-pulse-line', color: '#10b981', bg: 'rgba(16,185,129,0.12)' },
  { id: "subj-osteoAxiale", title: "Ostéologie axiale", icon: 'ri-bone-line', color: '#d97706', bg: 'rgba(217,119,6,0.12)' },
  { id: "subj-osteoApp", title: "Ostéologie appendiculaire", icon: 'ri-bone-line', color: '#b45309', bg: 'rgba(180,83,9,0.12)' },
  { id: "subj-mathsPhys", title: "Mathématiques et physique fondamentale", icon: 'ri-function-line', color: '#6366f1', bg: 'rgba(99,102,241,0.12)' },
  { id: "subj-semioPath", title: "Sémiologie et pathologie médicale", icon: 'ri-stethoscope-line', color: '#dc2626', bg: 'rgba(220,38,38,0.12)' },
  { id: "subj-soinsInf", title: "Soins infirmiers de base et pathologie chirurgicale", icon: 'ri-nurse-line', color: '#0ea5e9', bg: 'rgba(14,165,233,0.12)' },
  { id: "subj-droitEthique", title: "Le droit et l’éthique", icon: 'ri-scales-3-line', color: '#4b5563', bg: 'rgba(75,85,99,0.12)' },
  { id: "subj-demographie", title: "Démographie, épidémiologie et statistiques sanitaires", icon: 'ri-pie-chart-line', color: '#0891b2', bg: 'rgba(8,145,178,0.12)' },
  { id: "subj-psychoSocio", title: "Psychologie, sociologie", icon: 'ri-user-heart-line', color: '#be185d', bg: 'rgba(190,24,93,0.12)' }
];

const MEDICAL_ICONS = ['ri-heart-pulse-line','ri-stethoscope-line','ri-nurse-line','ri-microscope-line','ri-capsule-line','ri-flashlight-line','ri-scan-line','ri-file-list-3-line','ri-file-text-line','ri-magic-line','ri-radioactive-line','ri-pulse-line','ri-bone-line','ri-function-line','ri-ruler-line','ri-tools-line','ri-government-line','ri-chat-3-line','ri-settings-3-line','ri-scales-3-line','ri-pie-chart-line','ri-user-heart-line','ri-contrast-2-line','ri-drop-line','ri-test-tube-line'];
const COLOR_PALETTE = ['#6c63ff','#f59e0b','#3b82f6','#8b5cf6','#ec4899','#14b8a6','#ef4444','#f97316','#84cc16','#06b6d4','#a855f7','#22c55e','#64748b','#2563eb','#78716c','#10b981','#d97706','#b45309','#6366f1','#dc2626','#0ea5e9','#4b5563','#0891b2','#be185d'];

function getSubjectsData() {
  const edited = LS.get(KEY_EDITED_SUBJECTS, {});
  const customs = LS.get(KEY_CUSTOM_SUBJECTS, []);
  const base = DEFAULT_SUBJECTS.map(s => ({ ...s, ...(edited[s.id] || {}) }));
  return [...base, ...customs];
}
function saveEditedSubject(id, updates) {
  const edited = LS.get(KEY_EDITED_SUBJECTS, {});
  edited[id] = { ...edited[id], ...updates };
  LS.set(KEY_EDITED_SUBJECTS, edited);
}
function addCustomSubject(subj) {
  const customs = LS.get(KEY_CUSTOM_SUBJECTS, []);
  customs.push(subj);
  LS.set(KEY_CUSTOM_SUBJECTS, customs);
}
function deleteCustomSubject(id) {
  const customs = LS.get(KEY_CUSTOM_SUBJECTS, []).filter(s => s.id !== id);
  LS.set(KEY_CUSTOM_SUBJECTS, customs);
  const edited = LS.get(KEY_EDITED_SUBJECTS, {});
  delete edited[id];
  LS.set(KEY_EDITED_SUBJECTS, edited);
}
function isCustomSubject(id) { return id.startsWith('custom-'); }

function getStudyData() {
  const subjects = getSubjectsData();
  return [{
    id: "cat-radiologie", title: "Option Radiologique",
    subjects: subjects.map(s => ({
      id: s.id, title: s.title,
      units: [{ id: "u-"+s.id, title: "Général", lessons: [{ id: "l-"+s.id, title: "Cours", branches: [{ id: "b-"+s.id, title: "Chapitre 1", partials: [] }] }] }]
    }))
  }];
}

function getAllPartials() {
  const builtin = [];
  getStudyData().forEach(cat => cat.subjects.forEach(subj =>
    subj.units.forEach(unit => unit.lessons.forEach(lesson =>
      lesson.branches.forEach(branch => branch.partials.forEach(p =>
        builtin.push({ ...p, branchId: branch.id, branchTitle: branch.title, lessonTitle: lesson.title, unitTitle: unit.title, subjectTitle: subj.title, subjectId: subj.id, catTitle: cat.title })
      ))
    ))
  ));
  const customs = getCustomPartials().map(p => {
    const branch = findBranch(p.branchId);
    return { ...p, branchTitle: branch ? branch.title : '', lessonTitle: branch ? branch.lessonTitle : '', unitTitle: branch ? branch.unitTitle : '', subjectTitle: branch ? branch.subjectTitle : '', subjectId: branch ? branch.subjectId : '', catTitle: branch ? branch.catTitle : '' };
  });
  return [...builtin, ...customs];
}
function getAllBranches() {
  const all = [];
  getStudyData().forEach(cat => cat.subjects.forEach(subj =>
    subj.units.forEach(unit => unit.lessons.forEach(lesson =>
      lesson.branches.forEach(branch => all.push({ ...branch, lessonTitle: lesson.title, unitTitle: unit.title, subjectTitle: subj.title, subjectId: subj.id, catTitle: cat.title }))
    ))
  ));
  return all;
}
function findBranch(id) { return getAllBranches().find(b => b.id === id); }
function getBranchPartials(branchId) {
  const branch = findBranch(branchId);
  if (!branch) return [];
  const builtin = branch.partials ? branch.partials.map(p => ({ ...p, branchId })) : [];
  const customs = getCustomPartials().filter(p => p.branchId === branchId);
  return [...builtin, ...customs];
}
function getCustomPartials() { return LS.get(KEY_CUSTOM_PARTIALS, []); }
function addCustomPartial(branchId, title) {
  const customs = getCustomPartials();
  const id = 'custom-' + Date.now() + '-' + Math.random().toString(36).substr(2,5);
  customs.push({ id, branchId, title, createdAt: new Date().toISOString() });
  LS.set(KEY_CUSTOM_PARTIALS, customs);
  return id;
}
function deleteCustomPartial(id) { LS.set(KEY_CUSTOM_PARTIALS, getCustomPartials().filter(p => p.id !== id)); }
function getProgress() { return LS.get(KEY_PROGRESS, {}); }
function setPartialProgress(pid, data) { const p = getProgress(); const existing = p[pid] || {}; const merged = { ...existing, ...data }; Object.keys(merged).forEach(k => merged[k]===undefined && delete merged[k]); p[pid] = merged; LS.set(KEY_PROGRESS, p); }
function isCompleted(pid) { return !!(getProgress()[pid] || {}).completed; }
function getReviewCount(pid) { return ((getProgress()[pid] || {}).reviewCount) || 0; }
function getNotes(pid) { return (LS.get(KEY_NOTES, {}))[pid] || ''; }
function setNotes(pid, t) { const n = LS.get(KEY_NOTES, {}); n[pid] = t; LS.set(KEY_NOTES, n); }
function getExercises(pid) { return (LS.get(KEY_EXERCISES, {}))[pid] || []; }
function setExercises(pid, e) { const x = LS.get(KEY_EXERCISES, {}); x[pid] = e; LS.set(KEY_EXERCISES, x); }
function calcSubjectProgress(subjectId) { const all = getAllPartials().filter(p=>p.subjectId===subjectId); if(!all.length) return 0; return Math.round((all.filter(p=>isCompleted(p.id)).length / all.length)*100); }
function calcBranchProgress(branchId) { const ps = getBranchPartials(branchId); if(!ps.length) return 0; const done = ps.filter(p=>isCompleted(p.id)).length; return { done, total: ps.length, pct: Math.round((done/ps.length)*100) }; }
function calcOverallProgress() { const all = getAllPartials(); if(!all.length) return {done:0,total:0,pct:0}; const done = all.filter(p=>isCompleted(p.id)).length; return { done, total: all.length, pct: Math.round((done/all.length)*100) }; }
function totalReviews() { return Object.values(getProgress()).reduce((s,v)=>s+(v.reviewCount||0),0); }
function todayKey() { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function subjMeta(id) { const subs = getSubjectsData(); return subs.find(s=>s.id===id) || { icon:'ri-book-line', color:'#6c63ff', bg:'rgba(108,99,255,0.15)' }; }
function getCurrentWeekMonday() { const n=new Date(); const day=n.getDay(); const diff=day===0?-6:1-day; const m=new Date(n); m.setDate(n.getDate()+diff); m.setHours(0,0,0,0); return m; }
function getWeekEnd(m) { const e=new Date(m); e.setDate(m.getDate()+7); return e; }
function getWeekKey() { const m=getCurrentWeekMonday(); return `${m.getFullYear()}-${String(m.getMonth()+1).padStart(2,'0')}-${String(m.getDate()).padStart(2,'0')}`; }
function formatDate(d) { return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`; }
function getWeeklyGoal() { const g=LS.get(KEY_WEEKLY_GOAL,null); if(g&&g.weekMonday===getWeekKey()) return g; if(g) LS.set(KEY_WEEKLY_GOAL,null); return null; }
function saveWeeklyGoal(ids) { LS.set(KEY_WEEKLY_GOAL,{weekMonday:getWeekKey(),startDate:getCurrentWeekMonday().toISOString(),endDate:getWeekEnd(getCurrentWeekMonday()).toISOString(),partials:ids}); }
function calcGoalProgress(g) { const {partials}=g; const start=new Date(g.startDate), end=new Date(g.endDate); let done=0; partials.forEach(pid=>{ const p=getProgress()[pid]; if(p&&p.completed&&p.completedAt){ const d=new Date(p.completedAt); if(d>=start&&d<end) done++; } }); return {done,total:partials.length,pct:partials.length?Math.round((done/partials.length)*100):0}; }

let currentPage = 'home', historyStack = [];
function nav(page, push=true) { const main=['home','subjects','schedule','stats']; if(main.includes(page)) historyStack=[]; else if(push&&currentPage!==page) historyStack.push(currentPage); currentPage=page; updateNav(page); renderPage(page); }
function goBack() { const prev=historyStack.pop(); if(prev) nav(prev,false); else nav('home',false); }
function updateNav(page) { document.querySelectorAll('.nav-item').forEach(b=>b.classList.toggle('active',b.dataset.page===page)); const main=['home','subjects','schedule','stats']; const isMain=main.includes(page); document.getElementById('back-btn').style.display=isMain?'none':''; const titles={home:'Préparation Zakaria',subjects:'Modules',schedule:'Planning',stats:'Statistiques'}; if(page.startsWith('branch:')){ const b=findBranch(page.replace('branch:','')); document.getElementById('header-title').textContent=b?b.title:'Branche'; } else document.getElementById('header-title').textContent=titles[page]||'Préparation Zakaria'; }
function showToast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }
function renderPage(page) { const c=document.getElementById('page-content'); if(!c) return; c.scrollTop=0; try { if(page==='home') c.innerHTML=renderHome(); else if(page==='subjects') { c.innerHTML=renderSubjects(); updateSubjectsResults(); } else if(page==='schedule') c.innerHTML=renderSchedule(); else if(page==='stats') c.innerHTML=renderStats(); else if(page.startsWith('branch:')) c.innerHTML=renderBranch(page.replace('branch:','')); } catch(e) { c.innerHTML='<div class="page-inner"><p>Erreur de chargement.</p></div>'; } }

function renderHome() { const overall=calcOverallProgress(); const r=35,c=2*Math.PI*r; const offset=c-(overall.pct/100)*c; const wg=getWeeklyGoal(); let goalCard=''; if(wg&&wg.partials.length){ const gp=calcGoalProgress(wg); const gr=30,gc=2*Math.PI*gr; const goffset=gc-(gp.pct/100)*gc; const sd=formatDate(new Date(wg.startDate)),ed=formatDate(new Date(wg.endDate)); const allDone=gp.done===gp.total&&gp.total>0; goalCard=`<div id="goal-card" class="goal-progress-card" style="border-color:${allDone?'var(--green)':'var(--accent-light)'}"><div class="goal-circle-wrap"><svg width="70" height="70" viewBox="0 0 70 70"><circle cx="35" cy="35" r="${gr}" fill="none" stroke="var(--bg3)" stroke-width="6"/><circle id="goal-circle-fill" cx="35" cy="35" r="${gr}" fill="none" stroke="${allDone?'var(--green)':'var(--accent)'}" stroke-width="6" stroke-linecap="round" stroke-dasharray="${gc}" stroke-dashoffset="${goffset}" transform="rotate(-90 35 35)" style="transition:stroke-dashoffset 0.6s"/></svg><div class="goal-circle-text"><span id="goal-pct">${gp.pct}%</span><span class="goal-circle-sub">Objectif</span></div></div><div class="goal-info"><div class="goal-title">${allDone?'Objectif atteint!':'Objectif de la semaine'}</div><div class="goal-desc">${gp.done}/${gp.total} complété(s) (${sd} - ${ed})</div><div class="goal-actions"><button onclick="openChecklistModal()"><i class="ri-check-double-line"></i> Tâches</button><button onclick="openGoalModal()"><i class="ri-edit-line"></i> Modifier</button></div></div></div>`; } else { goalCard=`<div class="goal-empty-card"><i class="ri-focus-2-line goal-empty-icon"></i><div style="color:var(--text2);margin-bottom:8px;font-size:16px;font-weight:600">Objectif de la semaine</div><p style="font-size:13px;color:var(--text3);margin-bottom:16px">Définissez vos objectifs</p><button class="save-notes-btn" onclick="openGoalModal()"><i class="ri-add-line"></i> Définir</button></div>`; } const prog=getProgress(); const studiedBids=new Set(); getAllPartials().forEach(p=>{ if(prog[p.id]&&(prog[p.id].completed||prog[p.id].reviewCount>0)) studiedBids.add(p.branchId); }); const allBranches=getAllBranches(); const studied=allBranches.filter(b=>studiedBids.has(b.id)).slice(0,5); let recentHtml=''; if(studied.length){ recentHtml=`<div class="section-title">Dernièrement étudié</div><div class="recent-list">${studied.map(b=>{ const m=subjMeta(b.subjectId); const bp=calcBranchProgress(b.id); return `<div class="recent-item" onclick="nav('branch:${b.id}')"><div class="recent-item-icon" style="background:${m.bg};color:${m.color}"><i class="${m.icon}"></i></div><div class="recent-item-info"><div class="recent-item-title">${escHtml(b.title)}</div><div class="recent-item-sub">${escHtml(b.subjectTitle)} · ${bp.done}/${bp.total} parties</div></div><i class="ri-arrow-right-s-line" style="color:var(--text3);font-size:18px"></i></div>`; }).join('')}</div>`; } else { recentHtml=`<div class="empty-state"><i class="ri-book-open-line"></i><p>Commencez à étudier</p></div>`; } return `<div class="page-inner"><div class="home-hero"><div class="home-hero-label">Option Radiologique – ${new Date().getFullYear()}</div><div class="home-hero-title">Votre progression</div><div class="home-hero-progress"><div class="progress-ring-wrap"><svg width="80" height="80" viewBox="0 0 80 80"><circle class="progress-ring-bg" cx="40" cy="40" r="${r}"/><circle class="progress-ring-fill" cx="40" cy="40" r="${r}" stroke-dasharray="${c}" stroke-dashoffset="${offset}"/></svg><div class="progress-ring-text"><span>${overall.pct}%</span><span class="progress-ring-sub">Complété</span></div></div><div class="home-hero-stats"><div class="home-hero-stat"><span>Parties terminées</span><strong>${overall.done}/${overall.total}</strong></div><div class="home-hero-stat"><span>Révisions</span><strong>${totalReviews()}</strong></div></div></div></div>${goalCard}<div class="stats-row"><div class="stat-card"><div class="stat-card-icon" style="color:var(--accent)"><i class="ri-book-open-line"></i></div><div class="stat-card-val">${getSubjectsData().length}</div><div class="stat-card-lbl">Modules</div></div><div class="stat-card"><div class="stat-card-icon" style="color:var(--green)"><i class="ri-checkbox-circle-line"></i></div><div class="stat-card-val">${overall.done}</div><div class="stat-card-lbl">Complété</div></div></div>${recentHtml}</div>`; }

let searchQuery=''; const expandedSubjects=new Set(), expandedUnits=new Set();
function renderSubjects(){ return `<div class="page-inner"><div class="search-bar"><i class="ri-search-line"></i><input type="search" id="search-input" placeholder="Rechercher un module..." value="${escHtml(searchQuery)}" oninput="onSearchInput(this.value)" autocomplete="off"/></div><div id="subjects-results"></div></div>`; }
function onSearchInput(v){ searchQuery=v; updateSubjectsResults(); }
function updateSubjectsResults(){ const cont=document.getElementById('subjects-results'); if(!cont) return; const q=searchQuery.toLowerCase().trim(); if(q===''){ cont.innerHTML=getStudyData().map(cat=>renderCategory(cat)).join('')+`<button class="add-subject-btn" onclick="openAddSubjectModal()"><i class="ri-add-line"></i> Ajouter un module</button>`; restoreExpandState(); } else { cont.innerHTML=renderSearchResults(q); } }
function renderSearchResults(q){ const branches=getAllBranches().filter(b=>b.title.toLowerCase().includes(q)||b.subjectTitle.toLowerCase().includes(q)); if(!branches.length) return '<div class="empty-state"><i class="ri-search-line"></i><p>Aucun résultat</p></div>'; return branches.map(b=>{ const m=subjMeta(b.subjectId); const doneCount=b.partials.filter(p=>isCompleted(p.id)).length; return `<div class="subject-card" style="margin-bottom:8px"><div class="subject-header" onclick="nav('branch:${b.id}')"><div class="subject-icon" style="background:${m.bg};color:${m.color}"><i class="${m.icon}"></i></div><div class="subject-info"><div class="subject-name">${escHtml(b.title)}</div><div class="subject-progress">${escHtml(b.subjectTitle)} · ${doneCount}/${b.partials.length}</div></div><i class="ri-arrow-right-s-line" style="color:var(--text3)"></i></div></div>`; }).join(''); }
function renderCategory(cat){ const totalP=cat.subjects.reduce((s,subj)=>s+subj.units.reduce((s2,u)=>s2+u.lessons.reduce((s3,l)=>s3+l.branches.reduce((s4,b)=>s4+b.partials.length,0),0),0),0); const doneP=cat.subjects.reduce((s,subj)=>s+subj.units.reduce((s2,u)=>s2+u.lessons.reduce((s3,l)=>s3+l.branches.reduce((s4,b)=>s4+b.partials.filter(p=>isCompleted(p.id)).length,0),0),0),0); return `<div class="category-block"><div class="category-header"><i class="ri-folder-line" style="font-size:20px"></i><span class="category-header-text">${escHtml(cat.title)}</span><span class="category-badge">${doneP}/${totalP}</span></div>${cat.subjects.map(subj=>renderSubject(subj)).join('')}</div>`; }
function renderSubject(subj){ const m=subjMeta(subj.id); const pct=calcSubjectProgress(subj.id); const allP=subj.units.reduce((s,u)=>s+u.lessons.reduce((s2,l)=>s2+l.branches.reduce((s3,b)=>s3+b.partials.length,0),0),0); const doneP=subj.units.reduce((s,u)=>s+u.lessons.reduce((s2,l)=>s2+l.branches.reduce((s3,b)=>s3+b.partials.filter(p=>isCompleted(p.id)).length,0),0),0); return `<div class="subject-card" data-subject-id="${subj.id}"><div class="subject-header"><div class="subject-icon" style="background:${m.bg};color:${m.color}"><i class="${m.icon}"></i></div><div class="subject-info"><div class="subject-name">${escHtml(subj.title)}</div><div class="subject-progress">${doneP}/${allP} · ${pct}%</div></div><div class="subject-actions"><button class="subject-edit-btn" onclick="event.stopPropagation();openEditSubjectModal('${subj.id}')" title="Modifier"><i class="ri-edit-line"></i></button></div></div><div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div></div>`; }
function restoreExpandState(){}

let editingSubjectId = null;
function openAddSubjectModal() { editingSubjectId = null; document.getElementById('subject-modal-title').textContent = 'Ajouter un module'; document.getElementById('subject-name-input').value = ''; document.getElementById('subject-delete-btn').style.display = 'none'; renderIconColorGrids(); document.getElementById('subject-modal').classList.add('open'); }
function openEditSubjectModal(id) { editingSubjectId = id; const subj = getSubjectsData().find(s=>s.id===id); if(!subj) return; document.getElementById('subject-modal-title').textContent = 'Modifier le module'; document.getElementById('subject-name-input').value = subj.title; document.getElementById('subject-delete-btn').style.display = isCustomSubject(id) ? '' : 'none'; selectedIcon = subj.icon; selectedColor = subj.color; renderIconColorGrids(); document.getElementById('subject-modal').classList.add('open'); }
function closeSubjectModal() { document.getElementById('subject-modal').classList.remove('open'); }
let selectedIcon = 'ri-book-line', selectedColor = '#6c63ff';
function renderIconColorGrids() {
  document.getElementById('icon-grid').innerHTML = MEDICAL_ICONS.map(ic=>`<div class="icon-option${ic===selectedIcon?' selected':''}" onclick="selectIcon('${ic}')"><i class="${ic}"></i></div>`).join('');
  document.getElementById('color-grid').innerHTML = COLOR_PALETTE.map(c=>`<div class="color-option${c===selectedColor?' selected':''}" style="background:${c}" onclick="selectColor('${c}')"></div>`).join('');
}
function selectIcon(ic) { selectedIcon = ic; renderIconColorGrids(); }
function selectColor(c) { selectedColor = c; renderIconColorGrids(); }
function saveSubject() {
  const name = document.getElementById('subject-name-input').value.trim();
  if (!name) { showToast('Le nom est requis'); return; }
  if (editingSubjectId) {
    if (isCustomSubject(editingSubjectId)) {
      const customs = LS.get(KEY_CUSTOM_SUBJECTS, []).map(s => s.id===editingSubjectId ? {...s, title: name, icon: selectedIcon, color: selectedColor, bg: selectedColor+'20'} : s);
      LS.set(KEY_CUSTOM_SUBJECTS, customs);
    } else {
      saveEditedSubject(editingSubjectId, { title: name, icon: selectedIcon, color: selectedColor, bg: selectedColor+'20' });
    }
  } else {
    const id = 'custom-' + Date.now();
    addCustomSubject({ id, title: name, icon: selectedIcon, color: selectedColor, bg: selectedColor+'20' });
  }
  closeSubjectModal();
  nav('subjects', false);
  showToast('Module enregistré');
}
function deleteSubjectConfirm() {
  if (!editingSubjectId || !isCustomSubject(editingSubjectId)) return;
  deleteCustomSubject(editingSubjectId);
  closeSubjectModal();
  nav('subjects', false);
  showToast('Module supprimé');
}

function renderBranch(branchId){ const branch=findBranch(branchId); if(!branch) return '<div class="page-inner"><p>Branche introuvable</p></div>'; const bp=calcBranchProgress(branchId); return `<div class="page-inner"><div class="branch-header-card"><div class="branch-breadcrumb">${escHtml(branch.catTitle)} / ${escHtml(branch.subjectTitle)}</div><div class="branch-main-title">${escHtml(branch.title)}</div><div class="branch-progress-row"><div class="branch-progress-bar"><div class="progress-bar-fill" style="width:${bp.pct}%"></div></div><span class="branch-progress-val">${bp.done}/${bp.total}</span></div></div><div class="partial-list" id="partial-list-${branchId}">${getBranchPartials(branchId).map((p,i)=>renderPartialCard(p,i)).join('')}</div><div class="add-partial-row" style="margin-top:16px;display:flex;gap:8px"><input class="add-exercise-input" id="add-partial-input-${branchId}" placeholder="Nouvelle fiche..." style="flex:1" onkeydown="if(event.key==='Enter')addPartial('${branchId}')"/><button class="add-exercise-btn" onclick="addPartial('${branchId}')"><i class="ri-add-line"></i> Ajouter</button></div></div>`; }
function renderPartialCard(p,i){ const done=isCompleted(p.id); const rc=getReviewCount(p.id); const isCustom=p.id.startsWith('custom-'); return `<div class="partial-card ${done?'completed':''}" id="pc-${p.id}"><div class="partial-header" onclick="togglePartial('${p.id}')"><div class="partial-check ${done?'done':''}" id="chk-${p.id}">${done?'<i class="ri-check-line"></i>':''}</div><div class="partial-info"><div class="partial-title">${escHtml(p.title)} ${isCustom?'<span style="font-size:10px;opacity:0.6">(perso)</span>':''}</div><div class="partial-meta">${done?`<span class="chip chip-green"><i class="ri-check-line"></i> Complété</span>`:'<span class="chip chip-accent"><i class="ri-time-line"></i> En cours</span>'}${rc>0?`<span class="chip chip-yellow"><i class="ri-restart-line"></i> ${rc} révisions</span>`:''}</div></div>${isCustom?`<button class="delete-partial-btn" onclick="event.stopPropagation();deletePartial('${p.id}')" title="Supprimer"><i class="ri-delete-bin-line"></i></button>`:''}<i class="ri-arrow-down-s-line" id="chevron-${p.id}" style="color:var(--text3);font-size:20px;transition:transform 0.2s"></i></div><div class="partial-body" id="pb-${p.id}"><div class="tab-bar"><button class="tab-btn active" id="tab-notes-${p.id}" onclick="switchTab('${p.id}','notes')"><i class="ri-file-text-line"></i> Notes</button><button class="tab-btn" id="tab-exercises-${p.id}" onclick="switchTab('${p.id}','exercises')"><i class="ri-todo-line"></i> Exercices</button><button class="tab-btn" id="tab-review-${p.id}" onclick="switchTab('${p.id}','review')"><i class="ri-restart-line"></i> Révision</button></div><div id="tab-content-${p.id}">${renderNotesTab(p.id)}</div><div class="complete-btn-wrap"><button class="complete-btn ${done?'done':'undone'}" id="cbtn-${p.id}" onclick="toggleComplete('${p.id}')">${done?'<i class="ri-checkbox-circle-fill"></i> Annuler':'<i class="ri-checkbox-circle-line"></i> Marquer complété'}</button></div></div></div>`; }
function addPartial(branchId){ const input=document.getElementById('add-partial-input-'+branchId); if(!input||!input.value.trim()) return; addCustomPartial(branchId,input.value.trim()); input.value=''; document.getElementById('page-content').innerHTML=renderBranch(branchId); showToast('Fiche ajoutée'); }
function deletePartial(pid){ if(!confirm('Supprimer cette fiche ?')) return; deleteCustomPartial(pid); const currentBranchId=currentPage.replace('branch:',''); document.getElementById('page-content').innerHTML=renderBranch(currentBranchId); showToast('Fiche supprimée'); }
function togglePartial(pid){ const body=document.getElementById('pb-'+pid); const chevron=document.getElementById('chevron-'+pid); if(!body) return; const isOpen=body.classList.contains('open'); document.querySelectorAll('.partial-body.open').forEach(el=>el.classList.remove('open')); document.querySelectorAll('[id^="chevron-"]').forEach(el=>el.style.transform=''); if(!isOpen){ body.classList.add('open'); if(chevron) chevron.style.transform='rotate(180deg)'; } }
function switchTab(pid,tab){ ['notes','exercises','review'].forEach(t=>{ const btn=document.getElementById('tab-'+t+'-'+pid); if(btn) btn.classList.toggle('active',t===tab); }); const area=document.getElementById('tab-content-'+pid); if(!area) return; if(tab==='notes') area.innerHTML=renderNotesTab(pid); else if(tab==='exercises') area.innerHTML=renderExercisesTab(pid); else if(tab==='review') area.innerHTML=renderReviewTab(pid); }
function renderNotesTab(pid){ const notes=getNotes(pid); return `<div class="content-area" id="notes-area-${pid}"><textarea class="notes-textarea" id="notes-ta-${pid}" placeholder="Ajoutez vos notes...">${escHtml(notes)}</textarea><button class="save-notes-btn" onclick="saveNotes('${pid}')"><i class="ri-save-line"></i> Enregistrer</button></div>`; }
function renderExercisesTab(pid){ const exs=getExercises(pid); return `<div class="exercises-area" id="exs-area-${pid}">${exs.length?exs.map((ex,i)=>`<div class="exercise-item" id="ex-${pid}-${i}"><div class="exercise-check ${ex.done?'done':''}" onclick="toggleExercise('${pid}',${i})">${ex.done?'<i class="ri-check-line"></i>':''}</div><div class="exercise-text" style="${ex.done?'text-decoration:line-through;opacity:0.5':''}">${escHtml(ex.text)}</div><button style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px" onclick="deleteExercise('${pid}',${i})"><i class="ri-delete-bin-line"></i></button></div>`).join(''):'<p style="font-size:13px;color:var(--text3);text-align:center;padding:16px">Aucun exercice</p>'}<div class="add-exercise-row"><input class="add-exercise-input" id="ex-input-${pid}" placeholder="Nouvel exercice..." onkeydown="if(event.key==='Enter')addExercise('${pid}')"/><button class="add-exercise-btn" onclick="addExercise('${pid}')"><i class="ri-add-line"></i></button></div></div>`; }
function renderReviewTab(pid){ const rc=getReviewCount(pid); return `<div class="review-section"><div class="review-count">Révisions : <strong>${rc}</strong></div><button class="review-btn" onclick="addReview('${pid}')"><i class="ri-restart-line"></i> Ajouter une révision</button></div>`; }
function saveNotes(pid){ const ta=document.getElementById('notes-ta-'+pid); if(!ta) return; setNotes(pid,ta.value); showToast('Notes enregistrées'); }
function addExercise(pid){ const input=document.getElementById('ex-input-'+pid); if(!input||!input.value.trim()) return; const exs=getExercises(pid); exs.push({text:input.value.trim(),done:false}); setExercises(pid,exs); switchTab(pid,'exercises'); showToast('Exercice ajouté'); }
function toggleExercise(pid,idx){ const exs=getExercises(pid); if(!exs[idx]) return; exs[idx].done=!exs[idx].done; setExercises(pid,exs); switchTab(pid,'exercises'); }
function deleteExercise(pid,idx){ const exs=getExercises(pid); exs.splice(idx,1); setExercises(pid,exs); switchTab(pid,'exercises'); }
function addReview(pid){ const rc=getReviewCount(pid); setPartialProgress(pid,{reviewCount:rc+1}); switchTab(pid,'review'); showToast('Révision ajoutée'); }
function toggleComplete(pid){ const done=isCompleted(pid); const now=new Date().toISOString(); setPartialProgress(pid,{completed:!done,completedAt:!done?now:undefined}); const card=document.getElementById('pc-'+pid); const chk=document.getElementById('chk-'+pid); const cbtn=document.getElementById('cbtn-'+pid); if(card) card.classList.toggle('completed',!done); if(chk){ chk.className='partial-check '+(!done?'done':''); chk.innerHTML=!done?'<i class="ri-check-line"></i>':''; } if(cbtn){ cbtn.className='complete-btn '+(!done?'done':'undone'); cbtn.innerHTML=!done?'<i class="ri-checkbox-circle-fill"></i> Annuler':'<i class="ri-checkbox-circle-line"></i> Marquer complété'; } showToast(!done?'Marqué complété':'Annulé'); const act=LS.get(KEY_ACTIVITY,{}); const today=todayKey(); act[today]=(act[today]||0)+2; LS.set(KEY_ACTIVITY,act); updateGoalCardDisplay(); }

let selectedDay=todayKey();
function renderSchedule(){ const today=new Date(); const dayNames=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam']; const schedule=LS.get(KEY_SCHEDULE,{}); const days=[]; for(let i=-3;i<=3;i++){ const d=new Date(today); d.setDate(today.getDate()+i); const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; days.push({key,dayName:dayNames[d.getDay()],dayNum:d.getDate(),isToday:i===0,hasSessions:!!(schedule[key]&&schedule[key].length)}); } const allSubjects=getSubjectsData(); const sessions=schedule[selectedDay]||[]; return `<div class="page-inner"><div class="section-title">Semaine en cours</div><div class="week-grid" id="week-grid">${days.map(d=>`<div class="day-cell ${d.isToday?'today':''} ${d.key===selectedDay?'active':''} ${d.hasSessions?'has-sessions':''}" onclick="selectDay('${d.key}')"><div class="day-name">${d.dayName}</div><div class="day-num">${d.dayNum}</div><div class="day-dot"></div></div>`).join('')}</div><div class="session-add-card"><div class="session-add-title"><i class="ri-add-circle-line"></i> Ajouter une session</div><div class="session-add-row"><select class="session-select" id="sess-subj">${allSubjects.map(s=>`<option value="${s.id}">${s.title}</option>`).join('')}</select><input type="time" class="session-time-input" id="sess-time" value="09:00"><input type="number" class="session-duration-input" id="sess-duration" placeholder="Heure" min="0.5" max="12" step="0.5" value="1" style="width:80px;"></div><div style="margin-top:8px"><input type="text" class="add-exercise-input" id="sess-note" placeholder="Note optionnelle..." style="width:100%"></div><div style="margin-top:8px"><button class="session-add-submit" onclick="addSession()"><i class="ri-add-line"></i> Ajouter</button></div></div><div class="section-title">Sessions du jour</div><div class="sessions-container" id="sessions-cont">${renderSessionsList(sessions)}</div></div>`; }
function renderSessionsList(sessions){ if(!sessions.length) return '<div class="empty-state"><i class="ri-calendar-check-line"></i><p>Aucune session</p></div>'; return sessions.map((s,i)=>{ const m=subjMeta(s.subjectId); const subj=getSubjectsData().find(x=>x.id===s.subjectId); return `<div class="session-card ${s.completed?'completed':''}" id="session-${i}"><div class="session-time-badge">${s.time}</div><div class="session-info"><div class="session-subject" style="color:${m.color};${s.completed?'text-decoration:line-through;opacity:0.7':''}">${subj?escHtml(subj.title):escHtml(s.subjectId)}</div>${s.duration?`<div class="session-detail">⏱ ${s.duration}h</div>`:''}${s.note?`<div class="session-detail">${escHtml(s.note)}</div>`:''}</div><button class="session-complete-btn ${s.completed?'done':''}" onclick="toggleSessionComplete(${i})"><i class="ri-lg ${s.completed?'ri-checkbox-circle-fill':'ri-checkbox-circle-line'}"></i></button><button class="session-del" onclick="deleteSession(${i})"><i class="ri-delete-bin-line"></i></button></div>`; }).join(''); }
function selectDay(key){ selectedDay=key; document.getElementById('page-content').innerHTML=renderSchedule(); }
function addSession(){ const subjEl=document.getElementById('sess-subj'), timeEl=document.getElementById('sess-time'), durEl=document.getElementById('sess-duration'), noteEl=document.getElementById('sess-note'); if(!subjEl||!timeEl) return; const duration=durEl?parseFloat(durEl.value)||0:0; const schedule=LS.get(KEY_SCHEDULE,{}); if(!schedule[selectedDay]) schedule[selectedDay]=[]; schedule[selectedDay].push({subjectId:subjEl.value,time:timeEl.value,duration,note:noteEl?noteEl.value:'',completed:false}); schedule[selectedDay].sort((a,b)=>a.time.localeCompare(b.time)); LS.set(KEY_SCHEDULE,schedule); document.getElementById('page-content').innerHTML=renderSchedule(); showToast('Session ajoutée'); }
function toggleSessionComplete(idx){ const schedule=LS.get(KEY_SCHEDULE,{}); if(!schedule[selectedDay]||!schedule[selectedDay][idx]) return; schedule[selectedDay][idx].completed=!schedule[selectedDay][idx].completed; LS.set(KEY_SCHEDULE,schedule); document.getElementById('page-content').innerHTML=renderSchedule(); }
function deleteSession(idx){ const schedule=LS.get(KEY_SCHEDULE,{}); if(schedule[selectedDay]){ schedule[selectedDay].splice(idx,1); LS.set(KEY_SCHEDULE,schedule); } document.getElementById('page-content').innerHTML=renderSchedule(); }
function renderStats(){ const overall=calcOverallProgress(); const allSubjects=getSubjectsData(); const today=new Date(); const activity=LS.get(KEY_ACTIVITY,{}); const heatCells=[]; for(let i=90;i>=0;i--){ const d=new Date(today); d.setDate(today.getDate()-i); const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; const min=activity[key]||0; const lvl=min===0?0:min<30?1:min<60?2:min<120?3:4; heatCells.push(`<div class="heat-cell" data-lvl="${lvl}" title="${key}: ${Math.round(min)}min"></div>`); } return `<div class="page-inner"><div class="stats-hero-row"><div class="stats-mini"><div class="stats-mini-val text-accent">${overall.pct}%</div><div class="stats-mini-lbl">Progression</div></div><div class="stats-mini"><div class="stats-mini-val text-green">${overall.done}</div><div class="stats-mini-lbl">Complétés</div></div></div><div class="section-title">Progression par module</div><div class="subjects-progress">${allSubjects.map(subj=>{ const pct=calcSubjectProgress(subj.id); const m=subjMeta(subj.id); const allP=subj.units?subj.units.reduce((s,u)=>s+u.lessons.reduce((s2,l)=>s2+l.branches.reduce((s3,b)=>s3+b.partials.length,0),0),0):0; const doneP=subj.units?subj.units.reduce((s,u)=>s+u.lessons.reduce((s2,l)=>s2+l.branches.reduce((s3,b)=>s3+b.partials.filter(p=>isCompleted(p.id)).length,0),0),0):0; return `<div class="subj-progress-item"><div class="subj-progress-top"><span class="subj-progress-name"><i class="${m.icon}" style="color:${m.color};margin-right:6px"></i>${escHtml(subj.title)}</span><span class="subj-progress-pct">${pct}%</span></div><div class="progress-bar-wrap" style="height:8px;border-radius:4px"><div class="progress-bar-fill" style="width:${pct}%;background:${m.color};border-radius:4px"></div></div><div style="font-size:11px;color:var(--text3);margin-top:4px">${doneP}/${allP}</div></div>`; }).join('')}</div><div class="section-title">Activité (91 jours)</div><div class="heatmap-grid">${heatCells.join('')}</div><div class="heatmap-legend"><span>Moins</span><div class="heatmap-legend-cell" style="background:var(--bg3)"></div><div class="heatmap-legend-cell" data-lvl="1" style="background:rgba(108,99,255,0.25)"></div><div class="heatmap-legend-cell" data-lvl="2" style="background:rgba(108,99,255,0.5)"></div><div class="heatmap-legend-cell" data-lvl="3" style="background:rgba(108,99,255,0.75)"></div><div class="heatmap-legend-cell" data-lvl="4" style="background:var(--accent)"></div><span>Plus</span></div></div>`; }
let goalModalSearchQuery='';
function openGoalModal(){ document.getElementById('goal-modal').classList.add('open'); document.getElementById('goal-search-input').value=goalModalSearchQuery; document.getElementById('goal-modal-results').innerHTML=renderGoalResults(getWeeklyGoal()?.partials||[]); }
function closeGoalModal(){ document.getElementById('goal-modal').classList.remove('open'); }
function onGoalModalSearch(){ goalModalSearchQuery=document.getElementById('goal-search-input').value; document.getElementById('goal-modal-results').innerHTML=renderGoalResults(getWeeklyGoal()?.partials||[]); }
function renderGoalResults(sel){ const q=goalModalSearchQuery.toLowerCase().trim(); if(q){ const matching=getAllPartials().filter(p=>p.title.toLowerCase().includes(q)); if(!matching.length) return '<div class="empty-state"><i class="ri-search-line"></i><p>Aucun résultat</p></div>'; return '<div style="display:flex;flex-direction:column;gap:6px">'+matching.map(p=>{ const checked=sel.includes(p.id); return `<label class="modal-partial-label"><div class="modal-partial-checkbox ${checked?'checked':''}">${checked?'<i class="ri-check-line"></i>':''}</div><input type="checkbox" value="${p.id}" ${checked?'checked':''} style="display:none" onchange="toggleGoalCheckbox(this)"><span class="modal-partial-title">${escHtml(p.title)}</span><span style="font-size:11px;color:var(--text3)">${escHtml(p.subjectTitle)}</span></label>`; }).join('')+'</div>'; } const subjectsMap=new Map(); getAllBranches().forEach(b=>{ if(!subjectsMap.has(b.subjectId)) subjectsMap.set(b.subjectId,{subject:getSubjectsData().find(s=>s.id===b.subjectId),branches:[]}); subjectsMap.get(b.subjectId).branches.push(b); }); let html=''; subjectsMap.forEach((val,subjId)=>{ const m=subjMeta(subjId); html+=`<div style="margin-bottom:8px"><div class="modal-subject-header" onclick="toggleGoalSubject('${subjId}')"><div class="modal-subject-icon" style="background:${m.bg};color:${m.color}"><i class="${m.icon}"></i></div><div class="modal-subject-info"><div class="modal-subject-name">${escHtml(val.subject.title)}</div></div><i class="ri-arrow-right-s-line modal-subject-chevron" id="goal-chevron-${subjId}"></i></div><div class="modal-subject-body" id="goal-subject-body-${subjId}">${val.branches.map(b=>{ return `<div class="modal-branch-row" onclick="toggleGoalBranch('${b.id}')"><span class="modal-branch-name">${escHtml(b.title)}</span><i class="ri-arrow-down-s-line modal-branch-chevron" id="goal-branch-chevron-${b.id}"></i></div><div class="modal-partials-list" id="goal-branch-partials-${b.id}">${getBranchPartials(b.id).map(p=>{ const checked=sel.includes(p.id); return `<label class="modal-partial-label"><div class="modal-partial-checkbox ${checked?'checked':''}">${checked?'<i class="ri-check-line"></i>':''}</div><input type="checkbox" value="${p.id}" ${checked?'checked':''} style="display:none" onchange="toggleGoalCheckbox(this)"><span class="modal-partial-title">${escHtml(p.title)}</span></label>`; }).join('')}</div>`; }).join('')}</div></div>`; }); return html; }
function toggleGoalSubject(id){ const body=document.getElementById('goal-subject-body-'+id); const chevron=document.getElementById('goal-chevron-'+id); if(body){ body.classList.toggle('open'); chevron?.classList.toggle('open'); } }
function toggleGoalBranch(id){ const list=document.getElementById('goal-branch-partials-'+id); const chevron=document.getElementById('goal-branch-chevron-'+id); if(list){ list.classList.toggle('open'); chevron?.classList.toggle('open'); } }
function toggleGoalCheckbox(el){ const box=el.previousElementSibling; box.classList.toggle('checked',el.checked); box.innerHTML=el.checked?'<i class="ri-check-line"></i>':''; }
function saveWeeklyGoalFromModal(){ const ids=[...document.querySelectorAll('#goal-modal-results input[type="checkbox"]:checked')].map(cb=>cb.value); if(!ids.length){ showToast('Sélectionnez au moins une partie'); return; } saveWeeklyGoal(ids); closeGoalModal(); document.getElementById('page-content').innerHTML=renderHome(); showToast('Objectif enregistré'); }
function openChecklistModal(){ document.getElementById('checklist-modal').classList.add('open'); renderChecklist(); }
function closeChecklistModal(){ document.getElementById('checklist-modal').classList.remove('open'); updateGoalCardDisplay(); }
function renderChecklist(){ const goal=getWeeklyGoal(); const body=document.getElementById('checklist-body'); if(!goal||!goal.partials.length){ body.innerHTML='<p style="text-align:center;padding:20px">Aucune tâche</p>'; return; } const allPartials=getAllPartials(); body.innerHTML=goal.partials.map(pid=>{ const p=allPartials.find(pp=>pp.id===pid); if(!p) return ''; const done=isCompleted(pid); return `<div class="checklist-item"><div class="checklist-item-actions"><div class="checklist-checkbox ${done?'checked':''}" onclick="toggleChecklistItem('${pid}')">${done?'<i class="ri-check-line" style="font-size:14px"></i>':''}</div><button class="checklist-delete-btn" onclick="removeChecklistItem('${pid}')"><i class="ri-delete-bin-line"></i></button></div><div class="checklist-item-title">${escHtml(p.title)}</div><div class="checklist-item-sub">${escHtml(p.subjectTitle)}</div></div>`; }).join(''); }
function toggleChecklistItem(pid){ toggleComplete(pid); renderChecklist(); }
function removeChecklistItem(pid){ const goal=getWeeklyGoal(); if(!goal) return; goal.partials=goal.partials.filter(id=>id!==pid); if(!goal.partials.length){ clearWeeklyGoal(); closeChecklistModal(); } else LS.set(KEY_WEEKLY_GOAL,goal); renderChecklist(); updateGoalCardDisplay(); }
function updateGoalCardDisplay(){ const card=document.getElementById('goal-card'); if(!card) return; const goal=getWeeklyGoal(); if(!goal){ nav('home',false); return; } const gp=calcGoalProgress(goal); const gr=30,gc=2*Math.PI*gr; const goffset=gc-(gp.pct/100)*gc; const allDone=gp.done===gp.total&&gp.total>0; const circleFill=document.getElementById('goal-circle-fill'); if(circleFill){ circleFill.setAttribute('stroke-dashoffset',goffset); circleFill.setAttribute('stroke',allDone?'var(--green)':'var(--accent)'); } const pctSpan=document.getElementById('goal-pct'); if(pctSpan) pctSpan.textContent=gp.pct+'%'; }
function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
(function initGoalClear(){ const goal=LS.get(KEY_WEEKLY_GOAL,null); if(goal&&goal.weekMonday!==getWeekKey()) LS.set(KEY_WEEKLY_GOAL,null); })();
nav('home',false);
</script>
